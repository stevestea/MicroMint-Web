<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — MicroMints</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('mm-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div id="header"></div>
  <section class="section">
    <div class="container" style="max-width:620px">
      <div class="card center glow" id="confRoot" style="padding:50px 34px"></div>
    </div>
  </section>
  <div id="footer"></div>
  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const root = document.getElementById('confRoot');
      let order = null;
      try { order = JSON.parse(sessionStorage.getItem('mm-order')); } catch {}
      if (!order) {
        root.innerHTML = `<h2>No recent order</h2>
          <p class="muted mt-2 mb-3">Looks like you landed here directly.</p>
          <a href="index.html#shop" class="btn">Go shopping</a>`;
        return;
      }
      root.innerHTML = `
        <div style="width:84px;height:84px;border-radius:50%;background:var(--mint-050);color:var(--mint-700);display:grid;place-items:center;margin:0 auto 22px">
          <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <span class="eyebrow">Order confirmed</span>
        <h1 class="mt-2" style="font-size:clamp(1.8rem,4vw,2.4rem)">Thank you — your mints are on the way!</h1>
        <p class="lead mt-2">We’ve emailed a receipt to <b>${order.email}</b>. Get ready for a brighter smile. 🌿</p>
        <div class="card mt-3" style="background:var(--bg-sunk);text-align:left;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div><span class="muted" style="font-size:.85rem">Order number</span><br><b>${order.orderId}</b></div>
          <div style="text-align:right"><span class="muted" style="font-size:.85rem">Total paid</span><br><b>${formatPrice(order.total)}</b></div>
        </div>
        <div class="flex gap-2 wrap mt-4" style="justify-content:center">
          <a href="index.html#shop" class="btn">Keep shopping</a>
          <a href="index.html" class="btn btn-ghost">Back home</a>
        </div>`;
    });
  </script>
</body>
</html>
